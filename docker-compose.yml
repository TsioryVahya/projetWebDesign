services:
  app:
    build: .
    container_name: projet-web-design-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - APP_DEBUG=true
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: projet-web-design-db
    restart: always
    environment:
      MYSQL_DATABASE: journal_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
